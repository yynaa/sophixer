syntax = "proto3";
package renoise.to;

message MessageToRenoise {
  oneof to_message {
    Welcome welcome = 1;
    LoadSong load_song = 2;
    PlaySection play_section = 3;
    SetLoop set_loop = 4;
    StopTransport stop_transport = 5;
    MuteTrack mute_track = 6;
    MuteTrackSequenceSlot mute_track_sequence_slot = 7;
    BypassEffect bypass_effect = 8;
    SetParameterValue set_parameter_value = 9;
    SetBPM set_bpm = 10;
    SetMasterVolume set_master_volume = 11;
  }
}

message Welcome {}
message LoadSong {
  string song = 1;
}
message PlaySection {
  uint64 section = 1;
  bool force_play = 2;
}
message SetLoop {
  uint64 start = 1;
  uint64 end = 2;
}
message StopTransport {}
message MuteTrack {
  uint64 track = 1;
  bool mute = 2;
}
message MuteTrackSequenceSlot {
  uint64 track = 1;
  uint64 sequence = 2;
  bool bypass = 3;
}
message BypassEffect {
  uint64 track = 1;
  uint64 effect = 2;
  bool bypass = 3;
}
message SetParameterValue {
  uint64 track = 1;
  uint64 effect = 2;
  uint64 parameter = 3;
  double value = 4;
}
message SetBPM {
  double bpm = 1;
}
message SetMasterVolume {
  double volume = 1;
}
